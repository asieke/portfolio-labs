<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>%sveltekit.error.message%</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<style>
		body {
			font-family: 'Plus Jakarta Sans', sans-serif;
			background-image: url('/images/errorbg.png');
			background-size: cover;
		}
		main {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}

		h1,
		p,
		a {
			text-shadow: 0 0 4px #666;
			color: white;
		}

		h1 {
			margin-top: 1rem;
			font-size: 5rem;
			font-weight: 900;
			margin-bottom: -20px;
		}

		p {
			font-size: 1.5rem;
			font-weight: 600;
		}

		a {
			color: white;
			font-weight: 600;
			text-decoration: none;
		}
	</style>
	<body>
		<main>
			<a href="/"><span aria-hidden="true">&larr;</span> Back to home</a>
			<h1>%sveltekit.error.message%</h1>
			<p>Status: %sveltekit.status%</p>
		</main>
	</body>
</html>
